name: Fast Livo CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push multi-arch image to GHCR"
        required: false
        default: false
        type: boolean
      image_name:
        description: "Target image name, e.g. ghcr.io/<owner>/fast-livo"
        required: false
        default: ""
        type: string

jobs:
  docker-build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            base_image: osrf/ros:humble-desktop
            tag_suffix: amd64
          - platform: linux/arm64
            base_image: arm64v8/ros:humble-ros-base
            tag_suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for CI verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fast_livo
          platforms: ${{ matrix.platform }}
          push: false
          provenance: false
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: fast-livo:ci-${{ matrix.tag_suffix }}

  publish:
    name: Publish Multi-Arch Image
    runs-on: ubuntu-24.04
    needs: docker-build
    if: github.event_name == 'workflow_dispatch' && inputs.push_image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          if [ -n "${{ inputs.image_name }}" ]; then
            echo "name=${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/${{ github.repository_owner }}/fast-livo" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fast_livo
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
